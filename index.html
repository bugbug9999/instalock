<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>InstaLock</title></head><body>
<title>InstaLock</title>
<style>
  :root{
    --ig-1:#feda75; --ig-2:#fa7e1e; --ig-3:#d62976; --ig-4:#962fbf; --ig-5:#4f5bd5;
    --bg:#000; --card:#000; --line:#262626; --text:#fff; --sub:#a8a8a8;
    --blue:#0095f6;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#111;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    color:var(--text);
  }

  /* phone frame */
  .phone{
    position:relative;width:100vw;height:100vh;max-width:440px;max-height:100dvh;
    background:var(--bg);overflow:hidden;
    display:flex;flex-direction:column;
  }
  @media(min-width:441px){
    .phone{border-radius:44px;height:min(94vh,900px);box-shadow:0 30px 90px rgba(0,0,0,.6);border:1px solid #222;}
  }

  /* status bar */
  .status{
    height:52px;flex:0 0 52px;display:flex;align-items:center;justify-content:space-between;
    padding:0 26px;font-size:16px;font-weight:600;letter-spacing:.3px;z-index:5;
  }
  .status .r{display:flex;align-items:center;gap:6px;}
  .status svg{display:block;}

  /* IG top bar */
  .igtop{
    flex:0 0 46px;display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;border-bottom:1px solid var(--line);
  }
  .logo{font-family:"Snell Roundhand","Brush Script MT",cursive;font-size:29px;font-weight:600;}
  .igtop .icons{display:flex;gap:20px;}
  .igtop .icons svg{width:25px;height:25px;stroke:#fff;fill:none;stroke-width:1.8;}

  /* feed */
  .feed{flex:1;overflow-y:auto;overflow-x:hidden;}
  .feed::-webkit-scrollbar{display:none;}

  .stories{display:flex;gap:16px;padding:12px 14px;border-bottom:1px solid var(--line);overflow-x:auto;}
  .stories::-webkit-scrollbar{display:none;}
  .story{flex:0 0 auto;text-align:center;width:64px;}
  .ring{width:64px;height:64px;border-radius:50%;padding:2.5px;
    background:linear-gradient(45deg,var(--ig-1),var(--ig-2),var(--ig-3),var(--ig-4),var(--ig-5));}
  .ring>div{width:100%;height:100%;border-radius:50%;border:2.5px solid #000;background-size:cover;background-position:center;}
  .story span{font-size:12px;color:#fff;display:block;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .post{border-bottom:1px solid var(--line);}
  .phead{display:flex;align-items:center;gap:10px;padding:11px 14px;}
  .avatar{width:34px;height:34px;border-radius:50%;background-size:cover;background-position:center;flex:0 0 34px;}
  .phead .nm{font-size:14px;font-weight:600;flex:1;}
  .phead .nm small{display:block;font-weight:400;color:var(--sub);font-size:11px;}
  .dots{color:#fff;font-size:20px;letter-spacing:1px;}
  .pimg{width:100%;aspect-ratio:1/1;background-size:cover;background-position:center;}
  .pacts{display:flex;align-items:center;gap:16px;padding:11px 14px 4px;}
  .pacts svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.9;}
  .pacts .spacer{flex:1;}
  .likes{padding:2px 14px;font-size:14px;font-weight:600;}
  .cap{padding:3px 14px 12px;font-size:14px;line-height:1.4;}
  .cap b{font-weight:600;}
  .cap .muted{color:var(--sub);}

  /* bottom tab */
  .tabbar{
    flex:0 0 56px;display:flex;align-items:center;justify-content:space-around;
    border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom);
  }
  .tabbar svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.9;}
  .tabbar .me{width:26px;height:26px;border-radius:50%;border:1.5px solid #fff;background-size:cover;background-position:center;}

  /* ===== iOS push notification banner ===== */
  .notif{
    position:absolute;top:10px;left:10px;right:10px;z-index:40;
    background:rgba(30,30,32,.72);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-radius:20px;padding:12px 14px;display:flex;gap:11px;align-items:flex-start;
    box-shadow:0 12px 34px rgba(0,0,0,.45);
    transform:translateY(-160%);opacity:0;transition:transform .55s cubic-bezier(.2,1.1,.3,1),opacity .4s;
  }
  .notif.show{transform:translateY(0);opacity:1;}
  .notif .ic{width:38px;height:38px;border-radius:9px;flex:0 0 38px;
    background:linear-gradient(45deg,var(--ig-2),var(--ig-3),var(--ig-4));
    display:flex;align-items:center;justify-content:center;}
  .notif .ic svg{width:24px;height:24px;fill:#fff;}
  .notif .tx{flex:1;min-width:0;}
  .notif .tx .t1{font-size:13px;font-weight:600;display:flex;justify-content:space-between;}
  .notif .tx .t1 span{color:var(--sub);font-weight:400;font-size:12px;}
  .notif .tx .t2{font-size:14px;margin-top:2px;line-height:1.35;}

  /* ===== LOCK OVERLAY ===== */
  .lock{
    position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:0 34px;gap:0;
    background:rgba(8,8,10,.55);backdrop-filter:blur(30px) saturate(120%);-webkit-backdrop-filter:blur(30px) saturate(120%);
    opacity:0;pointer-events:none;transition:opacity .32s ease;
  }
  .lock.show{opacity:1;pointer-events:auto;}
  .lock .glow{
    position:absolute;width:340px;height:340px;border-radius:50%;filter:blur(60px);opacity:.4;
    background:radial-gradient(circle,var(--ig-3),transparent 70%);
  }
  .lockbox{position:relative;display:flex;flex-direction:column;align-items:center;transform:scale(.7);transition:transform .45s cubic-bezier(.2,1.3,.35,1);}
  .lock.show .lockbox{transform:scale(1);}
  .padlock{
    width:104px;height:104px;border-radius:29px;
    background:linear-gradient(150deg,var(--ig-1),var(--ig-2),var(--ig-3),var(--ig-4),var(--ig-5));
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 18px 50px rgba(214,41,118,.5);margin-bottom:26px;
  }
  .padlock svg{width:54px;height:54px;fill:#fff;}
  .lock h1{font-size:26px;font-weight:700;letter-spacing:-.4px;}
  .lock .why{margin-top:12px;font-size:15px;color:#dfe0e4;line-height:1.5;max-width:270px;}
  .lock .why b{color:#fff;}
  .timerwrap{position:relative;margin-top:30px;display:flex;flex-direction:column;align-items:center;}
  .timer{
    font-size:60px;font-weight:200;font-variant-numeric:tabular-nums;letter-spacing:2px;
    font-feature-settings:"tnum";transition:transform .2s;
  }
  .timer small{display:block;font-size:13px;font-weight:500;color:var(--sub);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
  .timer.pop{transform:scale(1.14);color:#ff5c8a;}
  .bump{
    position:absolute;top:-30px;font-size:30px;font-weight:700;color:#ff5c8a;
    font-variant-numeric:tabular-nums;opacity:0;pointer-events:none;
    text-shadow:0 4px 20px rgba(255,41,118,.6);
  }
  .bump.go{animation:bumpUp 1.1s ease-out;}
  @keyframes bumpUp{
    0%{opacity:0;transform:translateY(14px) scale(.7);}
    18%{opacity:1;transform:translateY(0) scale(1);}
    75%{opacity:1;transform:translateY(-6px) scale(1);}
    100%{opacity:0;transform:translateY(-38px) scale(.95);}
  }
  .lock .btn{
    margin-top:34px;padding:15px 0;width:100%;max-width:300px;border-radius:15px;
    background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);
    font-size:16px;font-weight:600;color:#fff;
  }
  .lock .btn.ghost{margin-top:12px;background:transparent;border:none;color:var(--sub);font-weight:500;font-size:14px;}
  .lock .brand{position:absolute;bottom:calc(78px + env(safe-area-inset-bottom));font-size:13px;color:var(--sub);letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
  .lock .brand .dot{width:15px;height:15px;border-radius:5px;background:linear-gradient(45deg,var(--ig-2),var(--ig-4));}

  .shake{animation:shk .5s;}
  @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}

  /* director controls */
  .ctrl{
    position:absolute;left:0;right:0;bottom:0;z-index:80;display:flex;gap:8px;justify-content:center;
    padding:10px;background:linear-gradient(transparent,rgba(0,0,0,.8));
    transition:opacity .3s;
  }
  .ctrl.hide{opacity:0;pointer-events:none;}
  .ctrl button{
    flex:1;max-width:120px;padding:11px 8px;border-radius:12px;border:none;
    background:rgba(255,255,255,.12);color:#fff;font-size:13px;font-weight:600;backdrop-filter:blur(8px);
  }
  .ctrl button:active{background:rgba(255,255,255,.25);}
  .hint{position:absolute;top:56px;left:0;right:0;text-align:center;font-size:11px;color:#555;z-index:30;}

  @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important;}}
</style>

<div class="phone" id="phone">
  <!-- status bar -->
  <div class="status">
    <div class="l" id="clock">9:41</div>
    <div class="r">
      <svg width="18" height="12" viewBox="0 0 18 12"><rect x="0" y="7" width="3" height="5" rx="1" fill="#fff"/><rect x="4.5" y="5" width="3" height="7" rx="1" fill="#fff"/><rect x="9" y="2.5" width="3" height="9.5" rx="1" fill="#fff"/><rect x="13.5" y="0" width="3" height="12" rx="1" fill="#fff"/></svg>
      <svg width="17" height="12" viewBox="0 0 17 12"><path d="M8.5 2.3c2.3 0 4.4.9 6 2.4l1.2-1.3C13.8 1.5 11.3.5 8.5.5S3.2 1.5 1.3 3.4l1.2 1.3c1.6-1.5 3.7-2.4 6-2.4z" fill="#fff"/><path d="M8.5 5.7c1.3 0 2.5.5 3.4 1.4l1.2-1.3C11.9 4.5 10.3 3.8 8.5 3.8S5.1 4.5 3.9 5.8l1.2 1.3C6 6.2 7.2 5.7 8.5 5.7z" fill="#fff"/><circle cx="8.5" cy="9.5" r="1.6" fill="#fff"/></svg>
      <svg width="27" height="13" viewBox="0 0 27 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#fff" stroke-opacity=".5"/><rect x="2.5" y="2.5" width="16" height="8" rx="1.5" fill="#fff"/><rect x="23.5" y="4" width="1.6" height="5" rx=".8" fill="#fff" fill-opacity=".5"/></svg>
    </div>
  </div>

  <!-- IG top -->
  <div class="igtop">
    <div class="logo">Instagram</div>
    <div class="icons">
      <svg viewBox="0 0 24 24"><path d="M12 4v16M4 12h16" stroke-linecap="round"/></svg>
      <svg viewBox="0 0 24 24"><path d="M20 12c0 4-3.5 7-8 7-1 0-2-.2-2.9-.5L4 20l1.5-4.2C4.6 14.6 4 13.4 4 12c0-4 3.5-7 8-7s8 3 8 7z" stroke-linejoin="round"/></svg>
    </div>
  </div>

  <div class="hint" id="hint">누를 때마다 잠금 +2분 누적 · 화면 탭 = 컨트롤 숨김</div>

  <!-- feed -->
  <div class="feed" id="feed">
    <div class="stories" id="stories"></div>
    <div id="posts"></div>
  </div>

  <!-- tab bar -->
  <div class="tabbar">
    <svg viewBox="0 0 24 24"><path d="M3 10.5L12 3l9 7.5V21H3z" stroke-linejoin="round"/></svg>
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4" stroke-linecap="round"/></svg>
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="5"/><path d="M12 8v8M8 12h8" stroke-linecap="round"/></svg>
    <svg viewBox="0 0 24 24"><path d="M20.8 6.2a5 5 0 00-7.1 0l-1.7 1.7-1.7-1.7a5 5 0 10-7.1 7.1L12 21l8.8-7.7a5 5 0 000-7.1z" stroke-linejoin="round"/></svg>
    <div class="me" id="metab"></div>
  </div>

  <!-- notification -->
  <div class="notif" id="notif">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.3-9.2C1.2 8.6 2.7 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.3 0 4.8 3.6 3.3 6.8C19 16.5 12 21 12 21z"/></svg></div>
    <div class="tx">
      <div class="t1">Instagram <span>지금</span></div>
      <div class="t2" id="notiftext"></div>
    </div>
  </div>

  <!-- LOCK -->
  <div class="lock" id="lock">
    <div class="glow"></div>
    <div class="lockbox" id="lockbox">
      <div class="padlock"><svg viewBox="0 0 24 24"><path d="M17 9V7a5 5 0 00-10 0v2H5v12h14V9h-2zM9 7a3 3 0 016 0v2H9V7zm4 8.7V18h-2v-2.3a1.8 1.8 0 112 0z"/></svg></div>
      <h1>인스타그램이 잠겼어요</h1>
      <div class="why" id="lockwhy"></div>
      <div class="timerwrap">
        <div class="bump" id="bump">+2:00</div>
        <div class="timer" id="timerbox"><span id="ttime">02:00</span><small>잠금 해제까지</small></div>
      </div>
      <button class="btn" onclick="tryUnlock(this)">지금 열기</button>
      <button class="btn ghost" onclick="hideLock()">알겠어요, 참을게요</button>
    </div>
    <div class="brand"><span class="dot"></span> InstaLock · 반응 1개당 잠금 +2분</div>
  </div>

  <!-- director controls -->
  <div class="ctrl" id="ctrl">
    <button onclick="trigger('like')">❤️ 좋아요</button>
    <button onclick="trigger('share')">🔄 공유</button>
    <button onclick="trigger('follow')">➕ 팔로우</button>
  </div>
</div>

<script>
// ---- avatars / images (inline gradient SVG data-uris, no external requests) ----
function grad(a,b,c){
  const s=`<svg xmlns='http://www.w3.org/2000/svg' width='300' height='300'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='${a}'/><stop offset='.5' stop-color='${b}'/><stop offset='1' stop-color='${c}'/></linearGradient></defs><rect width='300' height='300' fill='url(#g)'/></svg>`;
  return "url(\"data:image/svg+xml;utf8,"+encodeURIComponent(s)+"\")";
}
const pals=[['#f7971e','#ffd200','#f5576c'],['#4facfe','#00f2fe','#43e97b'],['#fa709a','#fee140','#ff5858'],['#667eea','#764ba2','#f093fb'],['#30cfd0','#330867','#5b247a'],['#c471f5','#fa71cd','#ff9a9e'],['#0ba360','#3cba92','#84fab0'],['#ff6a00','#ee0979','#8e2de2']];
const names=['jiwon_kim','minsu.log','hana_daily','서울_카페투어','yuna__x','dev.taeho','pet_maru','트래블_소라'];

// stories
const st=document.getElementById('stories');
['내 스토리',...names.slice(0,6)].forEach((n,i)=>{
  const d=document.createElement('div');d.className='story';
  d.innerHTML=`<div class="ring"><div style="background:${grad(...pals[i%pals.length])}"></div></div><span>${n}</span>`;
  st.appendChild(d);
});
document.getElementById('metab').style.background=grad(...pals[3]);

// posts
const posts=[
  {u:'minsu.log',loc:'제주 애월',pal:1,likes:'2,481',cap:'주말 순삭 🌊 이런 데서 한 달만 살고 싶다'},
  {u:'서울_카페투어',loc:'성수동',pal:5,likes:'938',cap:'요즘 제일 핫한 신상 카페 발견 ☕️ 웨이팅 30분 각오'},
  {u:'pet_maru',loc:'',pal:6,likes:'12.4천',cap:'간식 앞에서 초롱초롱 🐶 이 표정 실화냐'},
];
const wrap=document.getElementById('posts');
posts.forEach(p=>{
  const el=document.createElement('div');el.className='post';
  el.innerHTML=`
   <div class="phead">
     <div class="avatar" style="background:${grad(...pals[p.pal])}"></div>
     <div class="nm">${p.u}${p.loc?`<small>${p.loc}</small>`:''}</div>
     <div class="dots">···</div>
   </div>
   <div class="pimg" style="background:${grad(...pals[(p.pal+2)%pals.length])}"></div>
   <div class="pacts">
     <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-9.3-9.2C1.2 8.6 2.7 5 6 5c2 0 3.2 1.2 4 2.3C10.8 6.2 12 5 14 5c3.3 0 4.8 3.6 3.3 6.8C19 16.5 12 21 12 21z"/></svg>
     <svg viewBox="0 0 24 24"><path d="M20 12c0 4-3.5 7-8 7-1 0-2-.2-2.9-.5L4 20l1.5-4.2C4.6 14.6 4 13.4 4 12c0-4 3.5-7 8-7s8 3 8 7z" stroke-linejoin="round"/></svg>
     <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z" stroke-linejoin="round"/></svg>
     <span class="spacer"></span>
     <svg viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V4a1 1 0 011-1h12a1 1 0 011 1z" stroke-linejoin="round"/></svg>
   </div>
   <div class="likes">좋아요 ${p.likes}개</div>
   <div class="cap"><b>${p.u}</b> ${p.cap}<div class="muted" style="margin-top:4px">댓글 128개 모두 보기</div></div>`;
  wrap.appendChild(el);
});

// live clock
function tick(){
  const d=new Date();let h=d.getHours(),m=d.getMinutes();
  document.getElementById('clock').textContent=h+':'+String(m).padStart(2,'0');
}
tick();setInterval(tick,10000);

// ---- interaction logic ----
const EVT={
  like:{text:t=>`<b>${t}</b>님 외 3명이 회원님의 게시물을 좋아합니다 ❤️`, why:t=>`방금 <b>${t}</b>님이 좋아요를 눌렀어요.<br>잠금 시간이 <b>+2분</b> 늘어났습니다.`},
  share:{text:t=>`<b>${t}</b>님이 회원님의 릴스를 공유했습니다 🔄`, why:t=>`<b>${t}</b>님이 회원님 릴스를 공유했어요.<br>잠금 시간이 <b>+2분</b> 늘어났습니다.`},
  follow:{text:t=>`<b>${t}</b>님이 회원님을 팔로우하기 시작했습니다 ➕`, why:t=>`<b>${t}</b>님이 방금 팔로우했어요.<br>잠금 시간이 <b>+2분</b> 늘어났습니다.`},
};
function pick(){return names[Math.floor(Math.random()*names.length)].replace(/_/g,' ');}

const notif=document.getElementById('notif'),lock=document.getElementById('lock'),lockbox=document.getElementById('lockbox');
const ttime=document.getElementById('ttime'),timerbox=document.getElementById('timerbox'),bump=document.getElementById('bump');
let timerId=null, remaining=0;
const ADD=120; // 반응 1개당 +2분

function fmt(s){const m=Math.floor(s/60),ss=String(s%60).padStart(2,'0');return m+':'+ss;}
function render(){ttime.textContent=fmt(remaining);}

function trigger(type){
  const who=pick();const e=EVT[type];
  document.getElementById('notiftext').innerHTML=e.text(who);
  document.getElementById('lockwhy').innerHTML=e.why(who);
  notif.classList.add('show');
  navigator.vibrate&&navigator.vibrate(30);
  setTimeout(()=>{
    notif.classList.remove('show');
    addTime();
  },1500);
}

function addTime(){
  remaining+=ADD;
  render();
  lock.classList.add('show');
  navigator.vibrate&&navigator.vibrate([40,60,40]);
  // +2:00 팝업 + 타이머 튀는 효과
  bump.classList.remove('go');void bump.offsetWidth;bump.classList.add('go');
  timerbox.classList.add('pop');setTimeout(()=>timerbox.classList.remove('pop'),220);
  if(!timerId){
    timerId=setInterval(()=>{
      remaining--; if(remaining<=0){remaining=0;render();clearInterval(timerId);timerId=null;hideLock();return;}
      render();
    },1000);
  }
}
function hideLock(){lock.classList.remove('show');clearInterval(timerId);timerId=null;remaining=0;render();}
function tryUnlock(btn){
  lockbox.classList.remove('shake');void lockbox.offsetWidth;lockbox.classList.add('shake');
  navigator.vibrate&&navigator.vibrate([50,30,50,30,80]);
  const t=btn.textContent;btn.textContent='잠금 모드에선 열 수 없어요';
  setTimeout(()=>btn.textContent=t,1400);
}

// tap screen to hide/show director controls (for clean recording)
const ctrl=document.getElementById('ctrl'),hint=document.getElementById('hint');
document.getElementById('feed').addEventListener('click',()=>{
  ctrl.classList.toggle('hide');hint.style.display='none';
});
</script>
</body></html>
