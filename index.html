<!doctype html><html lang="ko"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>InstaLock</title></head><body>
<title>InstaLock</title>
<style>
  :root{--ig-1:#feda75;--ig-2:#fa7e1e;--ig-3:#d62976;--ig-4:#962fbf;--ig-5:#4f5bd5;--sub:#a8a8a8;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;}
  .phone{position:relative;width:100vw;height:100dvh;max-width:442px;overflow:hidden;background:#000;}
  @media(min-width:443px){.phone{height:min(95vh,940px);border-radius:44px;box-shadow:0 30px 90px rgba(0,0,0,.6);border:1px solid #222;}}
  .bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center;}

  /* iOS push notification */
  .notif{position:absolute;top:6.2%;left:9px;right:9px;z-index:40;
    background:rgba(28,28,30,.66);backdrop-filter:blur(26px);-webkit-backdrop-filter:blur(26px);
    border-radius:20px;padding:12px 14px;display:flex;gap:11px;align-items:flex-start;
    box-shadow:0 12px 34px rgba(0,0,0,.5);
    transform:translateY(-220%);opacity:0;transition:transform .55s cubic-bezier(.2,1.1,.3,1),opacity .4s;}
  .notif.show{transform:translateY(0);opacity:1;}
  .notif .ic{width:38px;height:38px;border-radius:9px;flex:0 0 38px;
    background:linear-gradient(45deg,var(--ig-2),var(--ig-3),var(--ig-4));display:flex;align-items:center;justify-content:center;}
  .notif .ic svg{width:24px;height:24px;fill:#fff;}
  .notif .tx{flex:1;min-width:0;}
  .notif .t1{font-size:13px;font-weight:600;display:flex;justify-content:space-between;}
  .notif .t1 span{color:var(--sub);font-weight:400;font-size:12px;}
  .notif .t2{font-size:14px;margin-top:2px;line-height:1.35;}
  .notif b{font-weight:600;}

  /* LOCK */
  .lock{position:absolute;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:0 34px;background:rgba(8,8,10,.5);
    backdrop-filter:blur(30px) saturate(120%);-webkit-backdrop-filter:blur(30px) saturate(120%);
    opacity:0;pointer-events:none;transition:opacity .32s ease;}
  .lock.show{opacity:1;pointer-events:auto;}
  .lock .glow{position:absolute;width:340px;height:340px;border-radius:50%;filter:blur(60px);opacity:.4;
    background:radial-gradient(circle,var(--ig-3),transparent 70%);}
  .lockbox{position:relative;display:flex;flex-direction:column;align-items:center;transform:scale(.7);
    transition:transform .45s cubic-bezier(.2,1.3,.35,1);}
  .lock.show .lockbox{transform:scale(1);}
  .padlock{width:104px;height:104px;border-radius:29px;
    background:linear-gradient(150deg,var(--ig-1),var(--ig-2),var(--ig-3),var(--ig-4),var(--ig-5));
    display:flex;align-items:center;justify-content:center;box-shadow:0 18px 50px rgba(214,41,118,.5);margin-bottom:26px;}
  .padlock svg{width:54px;height:54px;fill:#fff;}
  .lock h1{font-size:26px;font-weight:700;letter-spacing:-.4px;}
  .lock .why{margin-top:12px;font-size:15px;color:#dfe0e4;line-height:1.5;max-width:280px;}
  .lock .why b{color:#fff;}
  .timerwrap{position:relative;margin-top:30px;display:flex;flex-direction:column;align-items:center;}
  .timer{font-size:60px;font-weight:200;font-variant-numeric:tabular-nums;letter-spacing:2px;transition:transform .2s;}
  .timer small{display:block;font-size:13px;font-weight:500;color:var(--sub);letter-spacing:2px;margin-top:2px;text-transform:uppercase;}
  .timer.pop{transform:scale(1.14);color:#ff5c8a;}
  .bump{position:absolute;top:-30px;font-size:30px;font-weight:700;color:#ff5c8a;font-variant-numeric:tabular-nums;
    opacity:0;pointer-events:none;text-shadow:0 4px 20px rgba(255,41,118,.6);}
  .bump.go{animation:bumpUp 1.1s ease-out;}
  @keyframes bumpUp{0%{opacity:0;transform:translateY(14px) scale(.7);}18%{opacity:1;transform:translateY(0) scale(1);}
    75%{opacity:1;transform:translateY(-6px) scale(1);}100%{opacity:0;transform:translateY(-38px) scale(.95);}}
  .lock .btn{margin-top:34px;padding:15px 0;width:100%;max-width:300px;border-radius:15px;
    background:rgba(255,255,255,.11);border:1px solid rgba(255,255,255,.16);font-size:16px;font-weight:600;color:#fff;}
  .lock .btn.ghost{margin-top:12px;background:transparent;border:none;color:var(--sub);font-weight:500;font-size:14px;}
  .lock .brand{position:absolute;bottom:calc(72px + env(safe-area-inset-bottom));font-size:13px;color:var(--sub);
    letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
  .lock .brand .dot{width:15px;height:15px;border-radius:5px;background:linear-gradient(45deg,var(--ig-2),var(--ig-4));}
  .shake{animation:shk .5s;}
  @keyframes shk{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px)}40%{transform:translateX(8px)}60%{transform:translateX(-6px)}80%{transform:translateX(4px)}}

  .ctrl{position:absolute;left:0;right:0;bottom:0;z-index:80;display:flex;gap:8px;justify-content:center;
    padding:10px 10px calc(10px + env(safe-area-inset-bottom));background:linear-gradient(transparent,rgba(0,0,0,.82));transition:opacity .3s;}
  .ctrl.hide{opacity:0;pointer-events:none;}
  .ctrl button{flex:1;max-width:120px;padding:11px 8px;border-radius:12px;border:none;
    background:rgba(255,255,255,.14);color:#fff;font-size:13px;font-weight:600;backdrop-filter:blur(8px);}
  .ctrl button:active{background:rgba(255,255,255,.3);}
  @media(prefers-reduced-motion:reduce){*{transition-duration:.01ms!important;animation-duration:.01ms!important;}}
</style>

      <div class="padlock"><svg viewBox="0 0 24 24"><path d="M17 9V7a5 5 0 00-10 0v2H5v12h14V9h-2zM9 7a3 3 0 016 0v2H9V7zm4 8.7V18h-2v-2.3a1.8 1.8 0 112 0z"/></svg></div>
      <h1>인스타그램이 잠겼어요</h1>

      <div class="timerwrap"><div class="bump" id="bump">+2:00</div>
        <div class="timer" id="timerbox"><span id="ttime">02:00</span><small>잠금 해제까지</small></div></div>

    <button onclick="trigger('like')">❤️ 좋아요</button>
    <button onclick="trigger('share')">🔄 공유</button>
    <button onclick="trigger('follow')">➕ 팔로우</button>
  </div>
</div>

<script>
const names=['kimaeyongari','byun_daeseng','free_gaaam','teu.insight','n.0122__','clo.ol_l2','caca_ice','ttpeok_053'];
const pick=()=>names[Math.floor(Math.random()*names.length)];
const EVT={
  like:{t:w=>`<b>${w}</b>님 외 3명이 회원님의 게시물을 좋아합니다 ❤️`, why:w=>`방금 <b>${w}</b>님이 좋아요를 눌렀어요.<br>잠금 시간이 <b>+2분</b> 늘어났습니다.`},
  share:{t:w=>`<b>${w}</b>님이 회원님의 릴스를 공유했습니다 🔄`, why:w=>`<b>${w}</b>님이 회원님 릴스를 공유했어요.<br>잠금 시간이 <b>+2분</b> 늘어났습니다.`},
  follow:{t:w=>`<b>${w}</b>님이 회원님을 팔로우하기 시작했습니다 ➕`, why:w=>`<b>${w}</b>님이 방금 팔로우했어요.<br>잠금 시간이 <b>+2분</b> 늘어났습니다.`},
};
const notif=document.getElementById('notif'),lock=document.getElementById('lock'),lockbox=document.getElementById('lockbox');
const ttime=document.getElementById('ttime'),timerbox=document.getElementById('timerbox'),bump=document.getElementById('bump');
let timerId=null,remaining=0;const ADD=120;
const fmt=s=>Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
const render=()=>ttime.textContent=fmt(remaining);

function trigger(type){
  const w=pick(),e=EVT[type];
  document.getElementById('notiftext').innerHTML=e.t(w);
  document.getElementById('lockwhy').innerHTML=e.why(w);
  notif.classList.add('show');navigator.vibrate&&navigator.vibrate(30);
  setTimeout(()=>{notif.classList.remove('show');addTime();},1500);
}
function addTime(){
  remaining+=ADD;render();lock.classList.add('show');
  navigator.vibrate&&navigator.vibrate([40,60,40]);
  bump.classList.remove('go');void bump.offsetWidth;bump.classList.add('go');
  timerbox.classList.add('pop');setTimeout(()=>timerbox.classList.remove('pop'),220);
  if(!timerId){timerId=setInterval(()=>{remaining--;if(remaining<=0){remaining=0;render();clearInterval(timerId);timerId=null;hideLock();return;}render();},1000);}
}
function hideLock(){lock.classList.remove('show');clearInterval(timerId);timerId=null;remaining=0;render();}
function tryUnlock(btn){
  lockbox.classList.remove('shake');void lockbox.offsetWidth;lockbox.classList.add('shake');
  navigator.vibrate&&navigator.vibrate([50,30,50,30,80]);
  const t=btn.textContent;btn.textContent='잠금 모드에선 열 수 없어요';setTimeout(()=>btn.textContent=t,1400);
}
document.querySelector('.bg').addEventListener('click',()=>document.getElementById('ctrl').classList.toggle('hide'));
</script></body></html>
